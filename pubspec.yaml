name: bananasnap
description: BanaSnap — Snap, detect, done! Deteksi kelayakan pisang dengan AI on-device.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Kamera & Galeri
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # TFLite untuk model AI on-device
  flutter_litert: ^0.1.7

  # Pemrosesan gambar
  image: ^4.1.7

  # Penyimpanan riwayat lokal
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # UI & utilitas
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#1A1A1A"
    theme_color: "#1A1A1A"

flutter:
  uses-material-design: true

  assets:
    - assets/model/banana_model.tflite
    - assets/model/labels.txt
